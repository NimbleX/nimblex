# Reboot 600 seconds after a panic
kernel.panic = 600
#
# Enable SysRq key (note: console security issues)
kernel.sysrq = 1
#
# Tune power management
vm.dirty_writeback_centisecs = 1500

# zram-backed swap tuning (see zram-swap.service).
# zram is orders of magnitude faster than disk swap, so the default
# anti-swap bias (60) actively hurts. Values >100 require kernel >=5.8.
vm.swappiness = 150
# Disable swap read-ahead. zram is microsecond-latency and effectively
# random-access; prefetching just wastes decompressions.
vm.page-cluster = 0

