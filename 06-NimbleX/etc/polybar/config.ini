;==========================================================
; Polybar configuration
; Replaces i3status with improved network status modules.
;
; Notable features vs. the old i3status config:
;   - WiFi label is colored per signal tier (red→green)
;   - IPv6 indicator: shows global address or orange warning
;   - VPN: auto-detected via nmcli (WireGuard/VPN connections)
;          or interface scan fallback; hidden when no VPN active
;   - Battery uses energy_full_design (matches i3status %)
;   - Load average colors orange when high
;
; Requires: polybar ≥ 3.6 for interface-type = wireless
;==========================================================

[colors]
background = #CC000000
foreground = #ffffff
orange     = #ff8800
red        = #ff3333
grey       = #666666
cyan       = #00ffcc

;----------------------------------------------------------
; Bar
;----------------------------------------------------------
[bar/main]
bottom = true
width  = 100%
height = 22

background = ${colors.background}
foreground = ${colors.foreground}

; Match i3 font; size 10 renders closer to i3bar's sizing
font-0 = DejaVu Sans Mono:size=10;2

border-size   = 0
padding-left  = 1
padding-right = 1
module-margin = 0

separator            = " | "
separator-foreground = ${colors.grey}

; core/erpk/mgmt/tc/zniper are WireGuard tunnels — handled by
; [module/vpn], not listed here as separate interface modules.
modules-left   = workspaces window-title
modules-center = 
modules-right  = wifi ipv6 vpn battery load cpu memory date volume tray

cursor-click  = pointer
cursor-scroll = ns-resize

;----------------------------------------------------------
; i3 Workspaces
;----------------------------------------------------------
[module/workspaces]
type = internal/i3
format = <label-state>
index-sort = true

; Focused workspace
label-focused         = %name%
#label-focused-background = #285577
label-focused-background = #77007700
label-focused-foreground = #ffffff
label-focused-padding    = 1

; Unfocused workspace
label-unfocused         = %name%
label-unfocused-padding = 1

; Workspace with urgent window
label-urgent         = %name%
label-urgent-background = #900000
label-urgent-foreground = #ffffff
label-urgent-padding    = 1

; Workspace visible on another monitor
label-visible         = %name%
label-visible-padding = 1

;----------------------------------------------------------
; Active window title
;----------------------------------------------------------
[module/window-title]
type      = internal/xwindow
label     = %title%
label-maxlen = 60

;----------------------------------------------------------
; System tray (polybar ≥ 3.7 dedicated tray module)
;----------------------------------------------------------
[module/tray]
type = internal/tray
#tray-size     = 18
tray-padding  = 2

;----------------------------------------------------------
; WiFi — signal-tier color coding
;
; ramp-signal is a FORMAT component: use <ramp-signal> inside
; format-connected, NOT %ramp-signal% inside label-connected.
; Each ramp-signal-N is a bare %{F...} open-tag; the closing
; %{F-} lives at the end of label-connected, so the whole
; label renders in that tier's color.
;
; interface-type = wireless auto-detects the wireless interface
; (polybar ≥ 3.6). For older versions use:
;   interface = ${env:WIFI_IFACE:wlan0}
;----------------------------------------------------------
[module/wifi]
type     = internal/network
interface-type = wireless
interval = 5

format-connected    = <ramp-signal><label-connected>
label-connected     = W: %signal%% %local_ip%%{F-}
label-disconnected  = W: down
label-disconnected-foreground = ${colors.grey}

; 0 = weakest (red) → 4 = strongest (green)
; Bare open color-tags; label-connected closes with %{F-}
ramp-signal-0 = %{F#ff3333}
ramp-signal-1 = %{F#ff8800}
ramp-signal-2 = %{F#ffdd00}
ramp-signal-3 = %{F#aaff00}
ramp-signal-4 = %{F#33ff33}

;----------------------------------------------------------
; IPv6 indicator
;----------------------------------------------------------
[module/ipv6]
type     = custom/script
exec     = /etc/polybar/scripts/ipv6.sh
interval = 30
label    = %output%

;----------------------------------------------------------
; VPN — dynamic WireGuard / VPN detection via nmcli
;
; Hidden entirely (zero width) when no VPN is active.
; Shows all active NM VPN/WireGuard connection names, or
; falls back to scanning for tun*/tap*/wg*/ppp* interfaces.
;----------------------------------------------------------
[module/vpn]
type     = custom/script
exec     = /etc/polybar/scripts/vpn.sh
interval = 10
label    = %output%
format-foreground = ${colors.cyan}

;----------------------------------------------------------
; Battery — custom script using energy_full_design
; This matches the i3status percentage (not energy_full),
; which reports the true capacity vs original design capacity.
; Shows CHR/BAT/FULL prefix so charging state is always clear.
;----------------------------------------------------------
[module/battery]
type     = custom/script
exec     = /etc/polybar/scripts/battery.sh
interval = 30
label    = %output%

;----------------------------------------------------------
; Load — 1-minute load average, orange when >= 75% of nCPUs
;----------------------------------------------------------
[module/load]
type     = custom/script
exec     = /etc/polybar/scripts/load.sh
interval = 5
label    = %output%

;----------------------------------------------------------
; CPU usage
;----------------------------------------------------------
[module/cpu]
type     = internal/cpu
interval = 5
label    = CPU: %percentage%%

format-warn             = <label-warn>
label-warn              = CPU: %percentage%%
label-warn-foreground   = ${colors.orange}
warn-percentage         = 80

;----------------------------------------------------------
; Memory
;----------------------------------------------------------
[module/memory]
type     = internal/memory
interval = 5
label    = RAM: %percentage_used%%

format-warn             = <label-warn>
label-warn              = RAM: %mb_free% free
label-warn-foreground   = ${colors.orange}
warn-percentage         = 90

;----------------------------------------------------------
; Date/time  (European day-first, matching i3status)
;----------------------------------------------------------
[module/date]
type     = internal/date
interval = 30
date     = %d-%m-%Y
time     = %H:%M
label    = %date% %time%

;----------------------------------------------------------
; Volume  (PulseAudio / PipeWire-PA compat)
;----------------------------------------------------------
[module/volume]
type            = internal/pulseaudio
sink            = @DEFAULT_SINK@
use-ui-max      = false

format-volume   = <label-volume>
label-volume    = ♪: %percentage%%

label-muted             = ♪: muted
label-muted-foreground  = ${colors.grey}
